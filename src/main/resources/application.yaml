spring:
  application:
    name: isb-payment-execution

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Payment Execution"
    businessArea: "Takaful and Shared Operations"
    businessDomain: "Islamic Cards and Payments"
    functionalPattern: "Process"
    assetType: "Payment Transaction"
    controlRecord: "Payment Transaction Procedure"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
